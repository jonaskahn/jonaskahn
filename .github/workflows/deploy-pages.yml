name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "style.css"
      - "script.js"
      - "robots.txt"
      - "sitemap.xml"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build & Deploy to gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p dist
          cp index.html style.css script.js robots.txt sitemap.xml dist/
          touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: ${{ github.event.head_commit.message || 'manual deploy' }}"
